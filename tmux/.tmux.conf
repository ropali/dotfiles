# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# performance + terminal quality
set -sg escape-time 0
set -g history-limit 100000
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g detach-on-destroy off

# sane visuals for pane/window lifecycle
set -g display-panes-time 1000
set -g display-time 2000
set -g repeat-time 600

# vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# vim-like pane navigation with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# quick pane resizing (hold prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on
setw -g pane-base-index 1
set -g base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

# Update the status bar every 3 seconds (default: 15 seconds)
set -g status-interval 5 

set -g status-position top

# Refresh tmux config with r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# workflow helpers
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind x kill-pane \; display-message "pane closed"
bind X kill-window \; display-message "window closed"
bind Space next-layout
bind e command-prompt -I "#{pane_current_path}" "new-window -c '%%'"

# popup scratch terminal (tmux >= 3.2)
bind-key P display-popup -E -w 85% -h 80% -d "#{pane_current_path}"

# quick session picker
bind-key s choose-tree -Zs

# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
# Then trigger the installation with Prefix + I
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # CPU and memory info

set -g @plugin 'egel/tmux-gruvbox'
# set desired theme options...
set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'

# set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-right-status-x " #{cpu -i 3} |  #{mem} | %H:%M " # e.g.: 30.01.2024

# statusline polish
set -g status-left-length 80
set -g status-right-length 120
set -g window-status-separator "  "
set -g pane-border-status off
set -g pane-border-format ""

# source-file ~/dotfiles/tmux/themes/Gruvbox.conf

# Custom layout: left 70% (split top/bottom 80%/20%), right 30%
# Usage: Ctrl+a L
bind-key C-l split-window -h -p 30 -c "#{pane_current_path}" \; split-window -v -p 25 -t 1 -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
